<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#181412">
<title>Painel Admin - SC Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf8f4; --ivory:#fff9f2;
  --gold:#b8966a; --gold-l:#d4b896; --gold-d:#8a6e48;
  --dark:#181412; --char:#2b2220; --muted:#7a6e68; --rose:#e8d9cc;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-container{background:var(--ivory);padding:48px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(184,150,106,.2);border-radius:12px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;letter-spacing:1px;color:var(--dark);margin-bottom:8px;}
.logo .amp{color:var(--gold);font-style:italic;margin:0 2px;}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:32px;}
.form-group{margin-bottom:20px;text-align:left;}
.label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.input{width:100%;height:46px;padding:0 14px;border:1px solid rgba(184,150,106,.28);background:var(--cream);color:var(--dark);font-size:15px;font-weight:200;outline:none;transition:border-color 250ms;}
.input:focus{border-color:var(--gold);}
.btn{width:100%;height:52px;background:var(--gold);color:var(--cream);font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:background 250ms,transform 200ms;}
.btn:hover{background:var(--gold-d);transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.error{color:#d32f2f;font-size:12px;margin-top:8px;display:none;}
.success{color:#2e7d32;font-size:12px;margin-top:8px;display:none;}
.info{font-size:11px;color:var(--muted);margin-top:24px;line-height:1.6;}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">SC<span class="amp">&</span>Wedding</div>
  <div class="subtitle">Painel Administrativo</div>
  
  <form id="loginForm">
    <div class="form-group">
      <label class="label" for="password">Senha de Acesso</label>
      <input type="password" id="password" class="input" placeholder="Digite sua senha" required>
    </div>
    <button type="submit" class="btn">Acessar Painel</button>
    <div id="error" class="error">Senha incorreta. Tente novamente.</div>
    <div id="success" class="success">Acesso concedido! Redirecionando...</div>
  </form>
  
  <div class="info">
    <strong>Para acessar o modo de edição:</strong><br>
    • Use a senha: <code>scwedding2025</code><br>
    • Ou acesse diretamente: <code>?admin=scwedding2025</code>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  const success = document.getElementById('success');
  
  // Resetar mensagens
  error.style.display = 'none';
  success.style.display = 'none';
  
  if (password === 'scwedding2025') {
    // Salvar no localStorage
    localStorage.setItem('scw_admin_access', password);
    
    // Mostrar sucesso
    success.style.display = 'block';
    
    // Redirecionar para o site principal com admin
    setTimeout(() => {
      window.location.href = './?admin=scwedding2025';
    }, 1500);
  } else {
    // Mostrar erro
    error.style.display = 'block';
    
    // Limpar campo
    document.getElementById('password').value = '';
  }
});
</script>
</body>
</html>
