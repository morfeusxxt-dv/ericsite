<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#181412">
<title>SC Wedding — Filmes & Fotos para Casamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ━━ TOKENS (integer px only) ━━ */
:root{
  --cream:#faf8f4; --ivory:#fff9f2;
  --gold:#b8966a; --gold-l:#d4b896; --gold-d:#8a6e48;
  --dark:#181412; --char:#2b2220; --muted:#7a6e68; --rose:#e8d9cc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;text-size-adjust:100%;-webkit-text-size-adjust:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;min-width:320px;}
img{display:block;width:100%;height:100%;object-fit:cover;}
button,input,textarea{font-family:inherit;border-radius:0;-webkit-appearance:none;appearance:none;}
button{cursor:pointer;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--gold-l);}
.hidden{display:none!important;}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 800ms ease,transform 800ms ease;}
.reveal.vis{opacity:1;transform:translateY(0);}
.editable{position:relative;}
.editable:hover::after{content:'✏️';position:absolute;top:4px;right:4px;font-size:12px;opacity:0.7;z-index:10;}
.editing{background:rgba(184,150,106,0.1);outline:2px solid var(--gold);border-radius:4px;padding:4px;}
.edit-controls{position:fixed;top:20px;right:20px;z-index:1000;background:var(--dark);color:var(--cream);padding:12px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);display:none;max-width:300px;}
.edit-controls.active{display:block;}
.edit-controls h3{font-size:14px;margin-bottom:8px;color:var(--gold-l);}
.edit-controls button{background:var(--gold);color:var(--cream);border:none;padding:6px 12px;margin:4px;border-radius:4px;cursor:pointer;font-size:11px;}
.edit-controls button:hover{background:var(--gold-d);}
.edit-controls button.cancel{background:var(--muted);}
.upload-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center;}
.upload-overlay.active{display:flex;}
.upload-content{background:var(--cream);padding:30px;border-radius:12px;max-width:500px;width:90%;text-align:center;}
.upload-content h3{margin-bottom:16px;color:var(--dark);}
.upload-content input[type="file"]{margin-bottom:16px;width:100%;}
.upload-content .preview{max-width:200px;max-height:200px;margin:16px auto;border-radius:8px;overflow:hidden;}
.upload-content .preview img{width:100%;height:100%;object-fit:cover;}
.upload-content button{margin:4px;}

/* ━━ NAV ━━ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:64px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 400ms,box-shadow 400ms;
}
#nav.solid{background:rgba(250,248,244,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 1px 0 rgba(184,150,106,.18);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:1px;color:var(--dark);display:flex;align-items:baseline;gap:0;}
.nav-logo .amp{color:var(--gold);font-style:italic;margin:0 1px;}
.nav-logo .sub{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-left:10px;align-self:center;}
.nav-right{display:flex;align-items:center;gap:10px;}
.edit-btn{height:36px;padding:0 16px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;font-weight:300;letter-spacing:2px;text-transform:uppercase;transition:background 200ms,color 200ms;display:inline-flex;align-items:center;}
.edit-btn:hover,.edit-btn:active{background:var(--gold);color:var(--cream);}
.ham{width:40px;height:40px;background:none;border:none;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:5px;padding:8px;}
.ham-l{display:block;height:1px;background:var(--dark);transition:transform 300ms,opacity 300ms,width 300ms;}
.ham-l:nth-child(1){width:24px;} .ham-l:nth-child(2){width:24px;} .ham-l:nth-child(3){width:16px;}
.ham.open .ham-l:nth-child(1){transform:translateY(6px) rotate(45deg);width:24px;}
.ham.open .ham-l:nth-child(2){opacity:0;}
.ham.open .ham-l:nth-child(3){transform:translateY(-6px) rotate(-45deg);width:24px;}
.mob-menu{position:fixed;inset:0;z-index:190;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transform:translateX(100%);transition:transform 450ms cubic-bezier(.77,0,.175,1);padding:80px 24px;}
.mob-menu.open{transform:translateX(0);}
.mob-menu a{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;font-style:italic;color:var(--cream);letter-spacing:1px;transition:color 200ms;}
.mob-menu a:hover,.mob-menu a:active{color:var(--gold-l);}
.mob-div{width:40px;height:1px;background:rgba(184,150,106,.4);}
.desk-links{display:none;list-style:none;gap:28px;}
.desk-links a{font-size:10px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--char);transition:color 250ms;}
.desk-links a:hover{color:var(--gold);}
@media(min-width:768px){#nav{padding:0 48px;height:72px;}.desk-links{display:flex;}.ham{display:none;}}

/* ━━ HERO ━━ */
.hero{height:100svh;min-height:600px;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;}
.hero-bg img{filter:brightness(.68) saturate(.88);}
.hero-vig{position:absolute;inset:0;background:linear-gradient(180deg,rgba(24,20,18,.2) 0%,transparent 40%,rgba(24,20,18,.72) 100%);}
.hero-ct{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:0 24px 64px;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;margin-bottom:16px;opacity:0;animation:fadeUp 700ms 300ms both;}
.hero-badge-line{width:32px;height:1px;background:var(--gold-l);}
.hero-badge-text{font-size:10px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,10vw,96px);font-weight:300;line-height:1.02;color:#fff;opacity:0;animation:fadeUp 800ms 500ms both;}
.hero-title em{font-style:italic;color:var(--gold-l);}
.hero-sub{margin-top:16px;font-size:clamp(14px,2.5vw,16px);font-weight:200;line-height:1.8;color:rgba(255,255,255,.72);max-width:480px;opacity:0;animation:fadeUp 800ms 700ms both;}
.hero-ctas{margin-top:32px;display:flex;flex-wrap:wrap;gap:12px;opacity:0;animation:fadeUp 800ms 900ms both;}
.btn-gold{height:50px;padding:0 36px;background:var(--gold);color:var(--cream);font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;border:none;display:inline-flex;align-items:center;transition:background 250ms,transform 200ms;}
.btn-gold:hover{background:var(--gold-d);transform:translateY(-2px);}
.btn-gold:active{transform:translateY(0);}
.btn-outline{height:50px;padding:0 32px;border:1px solid rgba(255,255,255,.4);background:transparent;color:rgba(255,255,255,.88);font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;display:inline-flex;align-items:center;transition:border-color 250ms,color 250ms;}
.btn-outline:hover{border-color:#fff;color:#fff;}
.hero-scroll-ind{position:absolute;bottom:28px;right:22px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeIn 1000ms 1200ms both;}
.hero-scroll-ind span{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.35);writing-mode:vertical-rl;}
.scroll-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bounce 2s ease-in-out infinite;}
@media(min-width:768px){.hero-ct{padding:0 80px 80px;}.hero-scroll-ind{bottom:44px;right:44px;}}

/* ━━ ORNAMENT ━━ */
.ornament{display:flex;align-items:center;gap:16px;padding:0 24px;margin:56px 0 0;}
.orn-line{flex:1;height:1px;background:var(--rose);}
.orn-icon{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);font-style:italic;line-height:1;}
@media(min-width:768px){.ornament{padding:0 48px;}}

/* ━━ SECTION HEAD ━━ */
.sec-head{text-align:center;padding:56px 24px 44px;}
.sec-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6vw,54px);font-weight:300;line-height:1.1;color:var(--dark);}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-desc{margin-top:14px;font-size:14px;font-weight:200;line-height:1.85;color:var(--muted);max-width:520px;margin-left:auto;margin-right:auto;}
@media(min-width:768px){.sec-head{padding:72px 48px 56px;}}

/* ━━ CHAPTERS ━━ */
.chapters{padding-bottom:72px;}
.chapter{display:grid;grid-template-columns:1fr;margin-bottom:6px;overflow:hidden;}
.ch-img-wrap{aspect-ratio:4/5;position:relative;overflow:hidden;}
.ch-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 900ms cubic-bezier(.25,.46,.45,.94),filter 800ms;filter:brightness(.88) saturate(.85);}
.chapter:hover .ch-img-wrap img{transform:scale(1.06);filter:brightness(.95) saturate(1);}
.ch-num{position:absolute;top:16px;left:16px;font-size:10px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.75);background:rgba(24,20,18,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:6px 12px;}
.ch-text{padding:28px 24px 32px;background:var(--ivory);display:flex;flex-direction:column;gap:8px;}
.ch-tag{display:inline-flex;align-items:center;gap:8px;}
.ch-tag-line{width:24px;height:1px;background:var(--gold);flex-shrink:0;}
.ch-tag-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.ch-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4vw,36px);font-weight:300;line-height:1.12;color:var(--dark);margin-top:4px;}
.ch-title em{font-style:italic;color:var(--gold);}
.ch-desc{font-size:14px;font-weight:200;line-height:1.9;color:var(--muted);}
@media(min-width:700px){
  .chapter{grid-template-columns:1fr 1fr;min-height:420px;}
  .ch-img-wrap{aspect-ratio:unset;}
  .ch-text{padding:48px 52px;justify-content:center;}
  .chapter.rev .ch-img-wrap{order:2;}
  .chapter.rev .ch-text{order:1;}
}
@media(min-width:1024px){.chapter{min-height:500px;}.ch-text{padding:60px 72px;}}

/* ━━ FULL QUOTE ━━ */
.full-quote{position:relative;overflow:hidden;padding:80px 24px;text-align:center;}
.fq-bg{position:absolute;inset:0;}
.fq-bg img{filter:brightness(.38) saturate(.65);}
.fq-inner{position:relative;z-index:1;}
.fq-mark{font-family:'Cormorant Garamond',serif;font-size:72px;line-height:.6;color:var(--gold-l);opacity:.45;margin-bottom:12px;}
.fq-text{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,38px);font-weight:300;font-style:italic;color:#fff;line-height:1.45;max-width:680px;margin:0 auto;}
.fq-author{margin-top:24px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);}
@media(min-width:768px){.full-quote{padding:112px 48px;}}

/* ━━ MINI GRID ━━ */
.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.mini-item{aspect-ratio:1;overflow:hidden;position:relative;}
.mini-item img{width:100%;height:100%;object-fit:cover;transition:transform 700ms ease,filter 700ms;filter:brightness(.9) saturate(.85);}
.mini-item:hover img{transform:scale(1.08);filter:brightness(1) saturate(1);}
.mini-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(24,20,18,.65) 0%,transparent 55%);opacity:0;transition:opacity 300ms;display:flex;align-items:flex-end;padding:14px;}
.mini-item:hover .mini-ov{opacity:1;}
.mini-lbl{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:#fff;}
@media(min-width:600px){.mini-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.mini-grid{grid-template-columns:repeat(4,1fr);}}


/* ━━ STATS ━━ */
.stats{background:var(--dark);padding:56px 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:40px;}
.stat{text-align:center;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--gold-l);line-height:1;}
.stat-n sup{font-size:18px;vertical-align:super;}
.stat-l{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.32);margin-top:8px;}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr);padding:72px 48px;}}

/* ━━ ABOUT ━━ */
.about{display:grid;grid-template-columns:1fr;}
.about-img{aspect-ratio:4/5;overflow:hidden;position:relative;}
.about-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.9) saturate(.85);transition:transform 900ms ease;}
.about:hover .about-img img{transform:scale(1.04);}
.about-text{padding:48px 24px 56px;background:var(--ivory);display:flex;flex-direction:column;justify-content:center;}
.about-text .sec-eye,.about-text .sec-title{text-align:left;}
.about-text .sec-title{margin-bottom:18px;}
.about-body{font-size:14px;font-weight:200;line-height:1.95;color:var(--muted);margin-bottom:24px;}
.about-sig{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;color:var(--gold);}
@media(min-width:768px){.about{grid-template-columns:1fr 1fr;}.about-img{aspect-ratio:unset;min-height:560px;}.about-text{padding:64px 72px;}}

/* ━━ TESTIMONIALS ━━ */
.testis{padding:64px 24px 72px;background:var(--cream);}
.testi-scroll{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;}
.testi-scroll::-webkit-scrollbar{display:none;}
.testi-card{flex:0 0 min(85vw,360px);border:1px solid rgba(184,150,106,.2);background:var(--ivory);padding:32px 28px;scroll-snap-align:start;transition:box-shadow 300ms;}
.testi-card:hover{box-shadow:0 16px 48px rgba(184,150,106,.12);}
.testi-q{font-family:'Cormorant Garamond',serif;font-size:52px;line-height:.8;color:var(--gold-l);opacity:.3;margin-bottom:4px;}
.testi-stars{color:var(--gold);font-size:13px;letter-spacing:2px;margin-bottom:10px;}
.testi-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;line-height:1.7;color:var(--char);margin-bottom:22px;}
.testi-name{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
.testi-date{font-size:11px;color:var(--muted);margin-top:4px;}
.testi-dots{display:flex;justify-content:center;gap:8px;margin-top:22px;}
.testi-dot{width:6px;height:6px;border-radius:50%;background:var(--rose);border:none;transition:background 300ms,transform 300ms;cursor:pointer;}
.testi-dot.act{background:var(--gold);transform:scale(1.3);}

/* ━━ CTA ━━ */
.cta-wrap{position:relative;overflow:hidden;padding:80px 24px;text-align:center;}
.cta-bg{position:absolute;inset:0;}
.cta-bg img{filter:brightness(.3) saturate(.55);}
.cta-inner{position:relative;z-index:1;}
.cta-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-l);margin-bottom:14px;}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,7vw,60px);font-weight:300;color:#fff;line-height:1.1;margin-bottom:36px;}
.cta-title em{font-style:italic;color:var(--gold-l);}
.cta-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;}
.btn-wa{height:52px;padding:0 32px;background:#25d366;color:#fff;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;border:none;display:inline-flex;align-items:center;gap:10px;transition:background 250ms,transform 200ms;}
.btn-wa:hover{background:#1da851;transform:translateY(-2px);}
.btn-wa:active{transform:translateY(0);}
.btn-ig{height:52px;padding:0 28px;border:1px solid rgba(255,255,255,.4);background:transparent;color:rgba(255,255,255,.88);font-size:11px;font-weight:300;letter-spacing:2px;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px;transition:border-color 250ms,color 250ms;}
.btn-ig:hover{border-color:#fff;color:#fff;}
@media(min-width:768px){.cta-wrap{padding:112px 48px;}}

/* ━━ FOOTER ━━ */
footer{background:var(--dark);padding:48px 24px 36px;}
.footer-inner{display:flex;flex-direction:column;gap:28px;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:1px;color:var(--cream);}
.footer-logo .amp{color:var(--gold);font-style:italic;margin:0 2px;}
.footer-tagline{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-top:4px;}
.footer-links{display:flex;flex-wrap:wrap;gap:18px;}
.footer-links a{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.32);transition:color 250ms;}
.footer-links a:hover{color:var(--gold-l);}
.footer-copy{font-size:10px;color:rgba(255,255,255,.16);letter-spacing:1px;border-top:1px solid rgba(255,255,255,.06);padding-top:22px;margin-top:6px;}
@media(min-width:768px){footer{padding:56px 48px 40px;}.footer-inner{flex-direction:row;justify-content:space-between;align-items:flex-end;}}

/* ━━ FLOAT WA ━━ */
.float-wa{position:fixed;bottom:22px;right:20px;z-index:150;width:56px;height:56px;border-radius:50%;background:#25d366;border:none;box-shadow:0 6px 22px rgba(37,211,102,.42);display:flex;align-items:center;justify-content:center;font-size:26px;line-height:1;transition:transform 200ms,box-shadow 200ms;}
.float-wa:hover,.float-wa:active{transform:scale(1.08);box-shadow:0 10px 30px rgba(37,211,102,.5);}

/* ━━ KEYFRAMES ━━ */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>

<!-- EDIT CONTROLS -->
<div class="edit-controls" id="editControls">
  <h3>📝 Modo Edição</h3>
  <p>Clique em qualquer texto ou imagem para editar</p>
  <button onclick="saveContent()">💾 Salvar Alterações</button>
  <button onclick="exportContent()">📥 Baixar JSON</button>
  <button onclick="toggleEditMode()" class="cancel">✕ Sair</button>
</div>

<!-- UPLOAD OVERLAY -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-content">
    <h3>📷 Trocar Imagem</h3>
    <input type="file" id="imageUpload" accept="image/*">
    <div class="preview" id="imagePreview"></div>
    <div>
      <button onclick="confirmImageUpload()">✅ Confirmar</button>
      <button onclick="cancelImageUpload()" class="cancel">❌ Cancelar</button>
    </div>
  </div>
</div>

<!-- FLOAT WA -->
<button class="float-wa" id="floatWa" aria-label="WhatsApp">💬</button>

<!-- MOBILE MENU -->
<div class="mob-menu" id="mobMenu">
  <a href="#historia" onclick="closeMob()">Galeria</a>
  <div class="mob-div"></div>
  <a href="#filmes" id="mobVidLink" onclick="closeMob()">Filmes</a>
  <div class="mob-div"></div>
  <a href="#sobre" onclick="closeMob()">Sobre</a>
  <div class="mob-div"></div>
  <a href="#depoimentos" onclick="closeMob()">Depoimentos</a>
  <div class="mob-div"></div>
  <a href="#contato" onclick="closeMob()">Contato</a>
</div>

<!-- NAV -->
<nav id="nav">
  <a href="#" class="nav-logo">SC<span class="amp">  </span>Wedding<span class="sub" id="navSub">PRODUCTIONS</span></a>
  <div class="nav-right">
    <ul class="desk-links">
      <li><a href="#historia">Galeria</a></li>
      <li><a href="#filmes" id="deskVidLink">Filmes</a></li>
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#depoimentos">Depoimentos</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
    <button class="edit-btn" id="editBtn" style="display: none;">📝 Editar</button>
    <button class="ham" id="ham" aria-label="Menu"><span class="ham-l"></span><span class="ham-l"></span><span class="ham-l"></span></button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"><img id="heroImg" src="" alt="SC Wedding" class="editable-image" data-field="hero.image"></div>
  <div class="hero-vig"></div>
  <div class="hero-ct">
    <div class="hero-badge"><div class="hero-badge-line"></div><span class="hero-badge-text editable" data-field="hero.badge" id="heroBadge"></span></div>
    <h1 class="hero-title editable" data-field="hero.title" id="heroTitle"></h1>
    <p class="hero-sub editable" data-field="hero.subtitle" id="heroSub"></p>
    <div class="hero-ctas">
      <button class="btn-gold" onclick="scrollS('historia')">Ver Portfólio</button>
      <button class="btn-outline" onclick="scrollS('contato')">Agendar Sessão</button>
    </div>
  </div>
  <div class="hero-scroll-ind"><div class="scroll-dot"></div><span>scroll</span></div>
</section>

<div class="ornament"><div class="orn-line"></div><div class="orn-icon">♡</div><div class="orn-line"></div></div>

<!-- GALLERY HEADER -->
<div class="sec-head reveal" id="historia">
  <p class="sec-eye editable" data-field="gallery.title" id="gallEye"></p>
  <h2 class="sec-title editable" data-field="gallery.subtitle" id="gallTitle"></h2>
  <p class="sec-desc editable" data-field="gallery.description" id="gallDesc"></p>
</div>

<!-- CHAPTERS -->
<section class="chapters" id="chaptersContainer"></section>

<!-- FULL QUOTE -->
<div class="full-quote reveal">
  <div class="fq-bg"><img id="quoteImg" src="" alt="" class="editable-image" data-field="quote.image"></div>
  <div class="fq-inner">
    <div class="fq-mark">"</div>
    <p class="fq-text editable" data-field="quote.text" id="quoteText"></p>
    <p class="fq-author editable" data-field="quote.author" id="quoteAuthor"></p>
  </div>
</div>

<!-- MAIS MEMÓRIAS -->
<section id="miniSection">
  <div class="ornament" style="margin-top:64px;"><div class="orn-line"></div><div class="orn-icon">✦</div><div class="orn-line"></div></div>
  <div class="sec-head reveal">
    <p class="sec-eye editable" data-field="memories.title" id="memoriesTitle"></p>
    <h2 class="sec-title editable" data-field="memories.subtitle" id="memoriesSubtitle"></h2>
  </div>
  <div class="mini-grid reveal" id="miniGrid"></div>
</section>

<!-- STATS -->
<div class="stats reveal" id="statsContainer"></div>

<!-- ABOUT -->
<section class="about" id="sobre">
  <div class="about-img reveal"><img id="aboutImg" src="" alt="SC Wedding" class="editable-image" data-field="about.image"></div>
  <div class="about-text reveal" style="transition-delay:120ms">
    <p class="sec-eye editable" data-field="about.title" id="aboutEye"></p>
    <h2 class="sec-title editable" data-field="about.subtitle" id="aboutTitle"></h2>
    <p class="about-body editable" data-field="about.description" id="aboutBody"></p>
    <div class="about-sig editable" data-field="about.signature" id="aboutSig"></div>
  </div>
</section>

<!-- TESTIMONIALS -->
<section class="testis reveal" id="depoimentos">
  <div class="sec-head" style="padding-top:0">
    <p class="sec-eye editable" data-field="testimonials.title" id="testiEye"></p>
    <h2 class="sec-title editable" data-field="testimonials.subtitle" id="testiTitle"></h2>
  </div>
  <div class="testi-scroll" id="testiScroll"></div>
  <div class="testi-dots" id="testiDots"></div>
</section>

<!-- CTA -->
<section class="cta-wrap reveal" id="contato">
  <div class="cta-bg"><img id="ctaImg" src="" alt="" class="editable-image" data-field="contact.image"></div>
  <div class="cta-inner">
    <p class="cta-eye editable" data-field="contact.title" id="ctaEye"></p>
    <h2 class="cta-title editable" data-field="contact.subtitle" id="ctaTitle"></h2>
    <div class="cta-btns">
      <button class="btn-wa" id="waBtn">💬 Chamar no WhatsApp</button>
      <button class="btn-ig" id="igBtn">📸 Ver Instagram</button>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-logo">SC<span class="amp"> </span>Wedding</div>
      <div class="footer-tagline editable" data-field="site.tagline" id="footerTagline"></div>
    </div>
    <div>
      <div class="footer-links">
        <a href="#" id="fInsta">Instagram</a>
        <a href="#" id="fFace">Facebook</a>
        <a href="#" id="fWa">WhatsApp</a>
      </div>
      <div class="footer-copy editable" data-field="site.copyright" id="footerCopy"></div>
    </div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
